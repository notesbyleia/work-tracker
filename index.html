<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>work tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Work Tracker</p>
        <h1>Plan work by portfolio, workstream, and task.</h1>
      </div>
      <div class="header-actions">
        <button id="seed-data" class="secondary">Preview sample data</button>
        <button id="exit-preview" class="ghost hidden">Back to my data</button>
        <button id="clear-data" class="ghost">Reset</button>
      </div>
    </header>

    <main>
      <section class="metrics" aria-label="today summary">
        <article>
          <span id="metric-chase">0</span>
          <p>chase today</p>
        </article>
        <article>
          <span id="metric-risk">0</span>
          <p>at risk</p>
        </article>
        <article>
          <span id="metric-back">0</span>
          <p>with me</p>
        </article>
        <article>
          <span id="metric-hours">0h</span>
          <p>planned effort</p>
        </article>
      </section>

      <section class="layout">
        <aside class="panel">
          <div class="panel-heading">
            <h2>Add portfolio</h2>
          </div>
          <form id="portfolio-form" class="stack">
            <label>
              Portfolio
              <input name="name" required placeholder="e.g. Corporate" />
            </label>
            <button type="submit">Create portfolio</button>
          </form>

          <div class="divider"></div>

          <div class="panel-heading">
            <h2>Add workstream</h2>
          </div>
          <form id="workstream-form" class="stack">
            <label>
              Portfolio
              <select name="portfolioId" id="workstream-portfolio" required></select>
            </label>
            <label>
              Workstream
              <input name="name" required placeholder="e.g. Quarterly planning" />
            </label>
            <label>
              Final workstream deadline
              <input name="deadline" required type="date" />
            </label>
            <label>
              Your effort after all task inputs
              <select name="effort">
                <option value="0.5">30 min</option>
                <option value="1">1 hour</option>
                <option value="2">2 hours</option>
                <option value="4">Half day</option>
                <option value="8">Full day</option>
              </select>
            </label>
            <button type="submit">Create workstream</button>
          </form>

          <div class="divider"></div>

          <div class="panel-heading">
            <h2>Add task</h2>
          </div>
          <form id="task-form" class="stack">
            <label>
              Workstream
              <select name="workstreamId" id="task-workstream" required></select>
            </label>
            <label>
              Task
              <textarea name="title" required placeholder="e.g. Draft briefing note"></textarea>
            </label>
            <label>
              People / agencies inputs needed
              <input name="inputs" placeholder="Optional, comma-separated, e.g. HR, Finance" />
            </label>
            <label class="checkbox-row">
              <input name="noInputs" type="checkbox" />
              <span>No external inputs needed; this task is with me</span>
            </label>
            <div class="two-col">
              <label>
                Task deadline
                <input name="dueDate" required type="date" />
              </label>
              <label>
                Expected delay
                <select name="expectedDelay">
                  <option value="0">Usually on time</option>
                  <option value="1">+1 day</option>
                  <option value="2">+2 days</option>
                  <option value="5">+1 week-ish</option>
                  <option value="30">Chronic late</option>
                </select>
              </label>
            </div>
            <label>
              Status
              <select name="status">
                <option value="waiting">Waiting</option>
                <option value="chased">Chased</option>
                <option value="with-me">With me</option>
                <option value="received">Inputs received</option>
                <option value="completed">Completed</option>
              </select>
            </label>
            <button type="submit">Add task</button>
          </form>

          <div class="divider"></div>

          <div class="panel-heading">
            <h2>Data</h2>
          </div>
          <div class="stack">
            <button id="download-data" type="button" class="secondary">Download CSV</button>
            <label>
              Upload data
              <input id="upload-data" type="file" accept=".csv,.json,application/json,text/csv" />
            </label>
            <fieldset class="import-mode">
              <legend>Upload mode</legend>
              <label class="checkbox-row">
                <input name="importMode" type="radio" value="merge" checked />
                <span>Add new entries to existing data</span>
              </label>
              <label class="checkbox-row">
                <input name="importMode" type="radio" value="replace" />
                <span>Replace all data with uploaded file</span>
              </label>
            </fieldset>
            <p id="import-status" class="meta" role="status"></p>
          </div>
        </aside>

        <section class="workspace">
          <nav class="tabs" aria-label="views">
            <button class="tab active" data-view="command">Today</button>
            <button class="tab" data-view="portfolios">Portfolios</button>
            <button class="tab" data-view="tasks">All tasks</button>
            <button class="tab" data-view="people">People</button>
          </nav>

          <section id="command-view" class="view active">
            <article class="priority-panel">
              <div class="panel-heading">
                <h2>Priority queue</h2>
              </div>
              <div id="priority-list" class="priority-list"></div>
            </article>

            <div class="view-grid">
              <article class="lane" data-lane="chased">
                <h2>To chase</h2>
                <div id="chase-list" class="card-list"></div>
              </article>
              <article class="lane" data-lane="waiting">
                <h2>Waiting</h2>
                <div id="waiting-list" class="card-list"></div>
              </article>
              <article class="lane" data-lane="received">
                <h2>With me</h2>
                <div id="back-list" class="card-list"></div>
              </article>
              <article class="lane" data-lane="completed">
                <h2>Completed</h2>
                <div id="completed-list" class="card-list"></div>
              </article>
            </div>
          </section>

          <section id="portfolios-view" class="view">
            <div id="portfolio-board" class="board"></div>
          </section>

          <section id="tasks-view" class="view">
            <div id="task-list" class="table-list"></div>
          </section>

          <section id="people-view" class="view">
            <div id="people-list" class="table-list"></div>
          </section>
        </section>
      </section>
    </main>

    <template id="empty-state">
      <div class="empty">
        <strong>Nothing here yet.</strong>
        <span>Create a portfolio, a workstream, then add tasks under it.</span>
      </div>
    </template>

    <script src="app.js?v=import-export-2"></script>
  </body>
</html>
