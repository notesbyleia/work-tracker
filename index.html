<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>work tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Work Tracker</p>
        <h1>Plan work by portfolio, workstream, and task.</h1>
      </div>
      <div class="header-actions">
        <button id="seed-data" class="secondary">Load sample data</button>
        <button id="clear-data" class="ghost">Reset</button>
      </div>
    </header>

    <main>
      <section class="metrics" aria-label="today summary">
        <article>
          <span id="metric-chase">0</span>
          <p>chase today</p>
        </article>
        <article>
          <span id="metric-risk">0</span>
          <p>at risk</p>
        </article>
        <article>
          <span id="metric-back">0</span>
          <p>back with me</p>
        </article>
        <article>
          <span id="metric-hours">0h</span>
          <p>planned effort</p>
        </article>
      </section>

      <section class="layout">
        <aside class="panel">
          <div class="panel-heading">
            <h2>Add portfolio</h2>
          </div>
          <form id="portfolio-form" class="stack">
            <label>
              Portfolio
              <input name="name" required placeholder="e.g. Transport" />
            </label>
            <button type="submit">Create portfolio</button>
          </form>

          <div class="divider"></div>

          <div class="panel-heading">
            <h2>Add workstream</h2>
          </div>
          <form id="workstream-form" class="stack">
            <label>
              Portfolio
              <select name="portfolioId" id="workstream-portfolio" required></select>
            </label>
            <label>
              Workstream
              <input name="name" required placeholder="e.g. HV lodgement scheme" />
            </label>
            <label>
              Final workstream deadline
              <input name="deadline" required type="date" />
            </label>
            <label>
              Your effort after all task inputs
              <select name="effort">
                <option value="0.5">30 min</option>
                <option value="1">1 hour</option>
                <option value="2">2 hours</option>
                <option value="4">Half day</option>
                <option value="8">Full day</option>
              </select>
            </label>
            <button type="submit">Create workstream</button>
          </form>

          <div class="divider"></div>

          <div class="panel-heading">
            <h2>Add task</h2>
          </div>
          <form id="task-form" class="stack">
            <label>
              Workstream
              <select name="workstreamId" id="task-workstream" required></select>
            </label>
            <label>
              Task
              <textarea name="title" required placeholder="e.g. Provide inputs to MOT's pre-cab paper"></textarea>
            </label>
            <label>
              People / agencies inputs needed
              <input name="inputs" required placeholder="Comma-separated, e.g. MOT, LTA, Finance" />
            </label>
            <div class="two-col">
              <label>
                Task deadline
                <input name="dueDate" required type="date" />
              </label>
              <label>
                Expected delay
                <select name="expectedDelay">
                  <option value="0">Usually on time</option>
                  <option value="1">+1 day</option>
                  <option value="2">+2 days</option>
                  <option value="5">+1 week-ish</option>
                  <option value="30">Chronic late</option>
                </select>
              </label>
            </div>
            <label>
              Status
              <select name="status">
                <option value="waiting">Waiting</option>
                <option value="chased">Chased</option>
                <option value="received">Received</option>
                <option value="completed">Completed</option>
              </select>
            </label>
            <button type="submit">Add task</button>
          </form>
        </aside>

        <section class="workspace">
          <nav class="tabs" aria-label="views">
            <button class="tab active" data-view="command">Today</button>
            <button class="tab" data-view="portfolios">Portfolios</button>
            <button class="tab" data-view="tasks">All tasks</button>
            <button class="tab" data-view="people">People</button>
          </nav>

          <section id="command-view" class="view active">
            <article class="priority-panel">
              <div class="panel-heading">
                <h2>Priority queue</h2>
              </div>
              <div id="priority-list" class="priority-list"></div>
            </article>

            <div class="view-grid">
              <article class="lane" data-lane="chased">
                <h2>To chase</h2>
                <div id="chase-list" class="card-list"></div>
              </article>
              <article class="lane" data-lane="waiting">
                <h2>Waiting</h2>
                <div id="waiting-list" class="card-list"></div>
              </article>
              <article class="lane" data-lane="received">
                <h2>Back with me</h2>
                <div id="back-list" class="card-list"></div>
              </article>
              <article class="lane" data-lane="completed">
                <h2>Completed</h2>
                <div id="completed-list" class="card-list"></div>
              </article>
            </div>
          </section>

          <section id="portfolios-view" class="view">
            <div id="portfolio-board" class="board"></div>
          </section>

          <section id="tasks-view" class="view">
            <div id="task-list" class="table-list"></div>
          </section>

          <section id="people-view" class="view">
            <div id="people-list" class="table-list"></div>
          </section>
        </section>
      </section>
    </main>

    <template id="empty-state">
      <div class="empty">
        <strong>Nothing here yet.</strong>
        <span>Create a portfolio, a workstream, then add tasks under it.</span>
      </div>
    </template>

    <script src="app.js?v=8a3e1ec"></script>
  </body>
</html>
